<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" width="1200" height="440" font-family="'Segoe UI', system-ui, -apple-system, Roboto, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Homologaciones</title>
  <desc id="d">Homologacion de materias asistida por IA: las materias de la institucion de origen se emparejan con el plan de estudios destino.</desc>

  <defs>
    <linearGradient id="hilo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="38%" r="70%">
      <stop offset="0" stop-color="#1e293b" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0f172a"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo grafito (el mismo tono que el panel de la app) -->
  <rect width="1200" height="440" rx="20" fill="#0f172a"/>
  <rect width="1200" height="440" rx="20" fill="url(#halo)"/>

  <!-- Titulo -->
  <g text-anchor="middle">
    <text x="600" y="74" font-size="42" font-weight="700" fill="#f8fafc" letter-spacing="0.5" opacity="0">
      Homologaciones
      <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="0.1s" fill="freeze"/>
    </text>
    <line x1="600" y1="92" x2="600" y2="92" stroke="url(#hilo)" stroke-width="3" stroke-linecap="round">
      <animate attributeName="x1" from="600" to="548" dur="0.6s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      <animate attributeName="x2" from="600" to="652" dur="0.6s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </line>
    <text x="600" y="120" font-size="15.5" fill="#94a3b8" opacity="0">
      Homologacion de materias asistida por IA  ·  Universidad Autonoma del Cauca
      <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="0.45s" fill="freeze"/>
    </text>
  </g>

  <!-- Encabezados de columna -->
  <text x="230" y="168" text-anchor="middle" font-size="12" font-weight="600" letter-spacing="2.5" fill="#64748b" opacity="0">
    ORIGEN
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.6s" fill="freeze"/>
  </text>
  <text x="970" y="168" text-anchor="middle" font-size="12" font-weight="600" letter-spacing="2.5" fill="#64748b" opacity="0">
    DESTINO
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.6s" fill="freeze"/>
  </text>

  <!-- Conectores (se dibujan solos) -->
  <g fill="none" stroke="url(#hilo)" stroke-width="2.5" stroke-linecap="round">
    <path id="c1" d="M 350 200 C 540 162, 660 162, 850 200" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" opacity="0.85">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1.2s" begin="1.0s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </path>
    <path id="c2" d="M 350 268 C 540 268, 660 268, 850 268" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" opacity="0.85">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1.2s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </path>
    <path id="c3" d="M 350 336 C 540 374, 660 374, 850 336" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" opacity="0.85">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1.2s" begin="1.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </path>
    <!-- La IA explora tambien otros emparejamientos (mas tenue) -->
    <path id="c4" d="M 350 200 C 560 250, 640 252, 850 268" stroke="#475569" stroke-width="1.5" pathLength="100" stroke-dasharray="3 5" stroke-dashoffset="100" opacity="0.5">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1.3s" begin="1.7s" fill="freeze"/>
    </path>
  </g>

  <!-- Pulsos que viajan por los hilos (animacion perpetua) -->
  <g fill="#ffffff" filter="url(#glow)">
    <circle r="3.4" opacity="0">
      <animateMotion dur="2.4s" begin="2.2s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear"><mpath href="#c1"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.4s" begin="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.4" opacity="0">
      <animateMotion dur="2.4s" begin="2.6s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear"><mpath href="#c2"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.4s" begin="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.4" opacity="0">
      <animateMotion dur="2.4s" begin="3.0s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear"><mpath href="#c3"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.4s" begin="3.0s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Insignias de coincidencia -->
  <g text-anchor="middle" font-size="12.5" font-weight="700">
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.9s" fill="freeze"/>
      <rect x="572" y="159" width="56" height="22" rx="11" fill="#0f172a" stroke="#34d399" stroke-width="1.2"/>
      <text x="600" y="174" fill="#6ee7b7">95%</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.1s" fill="freeze"/>
      <rect x="572" y="257" width="56" height="22" rx="11" fill="#0f172a" stroke="#22d3ee" stroke-width="1.2"/>
      <text x="600" y="272" fill="#67e8f9">88%</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.3s" fill="freeze"/>
      <rect x="572" y="325" width="56" height="22" rx="11" fill="#0f172a" stroke="#34d399" stroke-width="1.2"/>
      <text x="600" y="340" fill="#6ee7b7">92%</text>
    </g>
  </g>

  <!-- Tarjetas ORIGEN -->
  <g font-size="15" fill="#e2e8f0">
    <g opacity="0" transform="translate(-18 0)">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.7s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="-18 0" to="0 0" dur="0.5s" begin="0.7s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1"/>
      <rect x="110" y="174" width="240" height="52" rx="11" fill="#1e293b" stroke="#334155"/>
      <circle cx="130" cy="200" r="4" fill="#34d399"/>
      <text x="148" y="205">Calculo I</text>
    </g>
    <g opacity="0" transform="translate(-18 0)">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.85s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="-18 0" to="0 0" dur="0.5s" begin="0.85s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1"/>
      <rect x="110" y="242" width="240" height="52" rx="11" fill="#1e293b" stroke="#334155"/>
      <circle cx="130" cy="268" r="4" fill="#34d399"/>
      <text x="148" y="273">Algoritmos</text>
    </g>
    <g opacity="0" transform="translate(-18 0)">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.0s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="-18 0" to="0 0" dur="0.5s" begin="1.0s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1"/>
      <rect x="110" y="310" width="240" height="52" rx="11" fill="#1e293b" stroke="#334155"/>
      <circle cx="130" cy="336" r="4" fill="#34d399"/>
      <text x="148" y="341">Fisica General</text>
    </g>
  </g>

  <!-- Tarjetas DESTINO -->
  <g font-size="15" fill="#e2e8f0">
    <g opacity="0" transform="translate(18 0)">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.8s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="18 0" to="0 0" dur="0.5s" begin="0.8s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1"/>
      <rect x="850" y="174" width="240" height="52" rx="11" fill="#1e293b" stroke="#334155"/>
      <circle cx="870" cy="200" r="4" fill="#22d3ee"/>
      <text x="888" y="205">Calculo Diferencial</text>
    </g>
    <g opacity="0" transform="translate(18 0)">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.95s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="18 0" to="0 0" dur="0.5s" begin="0.95s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1"/>
      <rect x="850" y="242" width="240" height="52" rx="11" fill="#1e293b" stroke="#334155"/>
      <circle cx="870" cy="268" r="4" fill="#22d3ee"/>
      <text x="888" y="273">Programacion I</text>
    </g>
    <g opacity="0" transform="translate(18 0)">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.1s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="18 0" to="0 0" dur="0.5s" begin="1.1s" fill="freeze" calcMode="spline" keySplines="0.3 0 0.2 1"/>
      <rect x="850" y="310" width="240" height="52" rx="11" fill="#1e293b" stroke="#334155"/>
      <circle cx="870" cy="336" r="4" fill="#22d3ee"/>
      <text x="888" y="341">Fisica Mecanica</text>
    </g>
  </g>

  <!-- Pie: resumen del flujo -->
  <text x="600" y="410" text-anchor="middle" font-size="13.5" fill="#64748b" opacity="0">
    Certificado en PDF  →  extraccion + emparejamiento con IA  →  revision del comite  →  acta verificable
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="2.4s" fill="freeze"/>
  </text>
</svg>
